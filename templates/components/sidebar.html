      <!-- ═══════════════════════ SIDEBAR ═══════════════════════ -->
      <aside class="sidebar" style="position:relative;z-index:50;">

        <!-- Brand top -->
        <div class="sidebar-top">
          <div class="sidebar-brand" @click="switchTab('overview')" style="cursor:pointer;" title="Go to Overview">
            <img src="/static/logo.png" alt="Trofeo" class="theme-logo" style="height:26px;object-fit:contain;" />
          </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <div class="nav-section-label" x-text="t('Operations')"></div>

          <template x-for="tab in tabs" :key="tab.id">
            <button
              @click="switchTab(tab.id)"
              class="nav-item"
              :class="activeTab === tab.id ? 'active' : ''"
              :title="t(tab.label)"
            >
              <!-- Icon wrap gets gradient when active -->
              <span class="nav-icon-wrap">
                <i :data-lucide="tab.icon" style="width:14px;height:14px;"></i>
              </span>
              <span style="flex:1;text-align:left;" x-text="t(tab.label)"></span>
              <template x-if="tab.badge !== null && tab.badge > 0">
                <span
                  class="nav-badge"
                  :class="tab.badgeColor === 'yellow' ? 'nav-badge-yellow' : 'nav-badge-red'"
                  x-text="tab.badge"
                ></span>
              </template>
            </button>
          </template>
        </nav>

        <!-- Language Switcher Toggle -->
        <div style="padding:10px 16px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:6px;">
          <label class="text-[9px] font-bold text-[var(--text-3)] uppercase tracking-wider" x-text="t('Language / மொழி')"></label>
          <div class="header-chip" style="display:flex; align-items:center; gap:2px; padding:2px; border-radius:8px; background:var(--bg-canvas); border:1px solid var(--border); position:relative;">
            <button 
              @click="setLanguage('en')"
              class="switcher-btn"
              :class="language === 'en' ? 'active-auto' : ''"
              style="flex:1; justify-content:center; padding:4px 8px; font-size:10px; border-radius:6px;"
            >
              <span>English</span>
            </button>
            <button 
              @click="setLanguage('ta')"
              class="switcher-btn"
              :class="language === 'ta' ? 'active-manual' : ''"
              style="flex:1; justify-content:center; padding:4px 8px; font-size:10px; border-radius:6px;"
            >
              <span>தமிழ்</span>
            </button>
          </div>
        </div>

        <!-- User Footer -->
        <div class="sidebar-footer">
          <div class="user-avatar">OP</div>
          <div class="user-info">
            <div class="user-name">Operator</div>
            <div class="user-role" x-text="t('Administrator')"></div>
          </div>
          <div class="online-dot" title="Online"></div>
        </div>
      </aside>
