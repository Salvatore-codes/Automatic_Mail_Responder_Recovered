      <!-- ═══════════════════════ SIDEBAR ═══════════════════════ -->
      <aside class="sidebar" style="position:relative;z-index:50;">

        <!-- Brand top -->
        <div class="sidebar-top">
          <div class="sidebar-brand" @click="switchTab('overview')" style="cursor:pointer;" title="Go to Overview">
            <img src="/static/logo.png" alt="Trofeo" class="theme-logo" style="height:26px;object-fit:contain;" />
          </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <div class="nav-section-label" x-text="t('Operations')"></div>

          <template x-for="tab in tabs" :key="tab.id">
            <button
              x-show="currentUser.role === 'super_admin' || !['pricing', 'training', 'verticals', 'access'].includes(tab.id)"
              @click="switchTab(tab.id)"
              class="nav-item"
              :class="activeTab === tab.id ? 'active' : ''"
              :title="t(tab.label)"
            >
              <!-- Icon wrap gets gradient when active -->
              <span class="nav-icon-wrap">
                <i :data-lucide="tab.icon" style="width:14px;height:14px;"></i>
              </span>
              <span style="flex:1;text-align:left;" x-text="t(tab.label)"></span>
              <template x-if="tab.badge !== null && tab.badge > 0">
                <span
                  class="nav-badge"
                  :class="tab.badgeColor === 'yellow' ? 'nav-badge-yellow' : 'nav-badge-red'"
                  x-text="tab.badge"
                ></span>
              </template>
            </button>
          </template>
        </nav>

        <!-- Language Switcher Toggle -->
        <div style="padding:10px 16px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:6px;">
          <label class="text-[9px] font-bold text-[var(--text-3)] uppercase tracking-wider" x-text="t('Language / மொழி')"></label>
          <div class="header-chip" style="display:flex; align-items:center; gap:2px; padding:2px; border-radius:8px; background:var(--bg-canvas); border:1px solid var(--border); position:relative;">
            <button 
              @click="setLanguage('en')"
              class="switcher-btn"
              :class="language === 'en' ? 'active-auto' : ''"
              style="flex:1; justify-content:center; padding:4px 8px; font-size:10px; border-radius:6px;"
            >
              <span>English</span>
            </button>
            <button 
              @click="setLanguage('ta')"
              class="switcher-btn"
              :class="language === 'ta' ? 'active-manual' : ''"
              style="flex:1; justify-content:center; padding:4px 8px; font-size:10px; border-radius:6px;"
            >
              <span>தமிழ்</span>
            </button>
          </div>
        </div>

        <!-- User Footer -->
        <div class="sidebar-footer" @click="dossierUser = currentUser; showDossier = true; triggerLucide();" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 16px; cursor:pointer;" class="hover:bg-[rgba(255,255,255,0.015)] transition-all" title="View Operator Dossier">
          <div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">
            <div class="user-avatar" x-text="getUserInitials(currentUser)">OP</div>
            <div class="user-info" style="min-width:0; flex:1;">
              <div class="user-name" style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap; font-weight:700;" x-text="currentUser.full_name || 'Operator'">Operator</div>
              <div class="user-role" style="font-size:10px; opacity:0.75;" x-text="currentUser.role === 'super_admin' ? t('Super Admin') : t('Sales Operator')"></div>
            </div>
          </div>
          <button @click.stop="logoutUser()" class="text-[var(--text-3)] hover:text-[var(--red)] transition-colors" style="background:none; border:none; cursor:pointer; padding:4px;" title="End Session">
            <i data-lucide="log-out" style="width:14px; height:14px;"></i>
          </button>
        </div>
      </aside>
