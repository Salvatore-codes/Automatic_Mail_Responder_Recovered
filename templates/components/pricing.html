<!-- TAB: DYNAMIC PRICING -->
<div class="tab-content" :class="{ 'active': activeTab === 'pricing' }">

  <div class="ov-hero page-hero">
    <div class="ov-hero-glow" aria-hidden="true"></div>
    <div class="ov-hero-main">
      <div class="ov-eyebrow">Pricing Rules &amp; Contracts</div>
      <h1 class="ov-title">Dynamic Pricing Engine</h1>
      <p class="ov-sub">Manage customer-specific contract rates and tier-based discounts by product categories.</p>
    </div>
    <div class="ov-hero-side">
      <div class="ov-pulse"><span class="ov-pulse-dot"></span> Active</div>
    </div>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
    
    <!-- LEFT COLUMN: TIER CATEGORY DISCOUNTS -->
    <div class="section-card" style="padding:20px;">
      <div class="section-header" style="border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
        <h3 class="section-title">
          <i data-lucide="percent" class="w-4 h-4" style="color:var(--accent);"></i>
          Tier-based Category Pricing
        </h3>
        
        <!-- Local Search -->
        <input 
          type="text" 
          placeholder="Filter rules..." 
          x-model="rulesSearch" 
          @input="rulesPage = 1" 
          class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-[10px] text-[var(--text-1)] px-2.5 py-1 outline-none focus:border-[var(--accent)] w-32" 
        />
      </div>

      <!-- Add Rule Form -->
      <form @submit.prevent="addTierRule" style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px; background:rgba(255,255,255,0.02); padding:14px; border:1px solid var(--border); border-radius:12px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">Customer Tier</label>
            <select x-model="newRule.tier" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)] cursor-pointer" style="height:38px;">
              <option value="wholesale">Wholesale</option>
              <option value="contractor">Contractor</option>
            </select>
          </div>
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">Category</label>
            <select x-model="newRule.category" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)] cursor-pointer" style="height:38px;">
              <option value="Plumbing">Plumbing</option>
              <option value="Fasteners">Fasteners</option>
              <option value="Tools">Tools</option>
              <option value="Electrical">Electrical</option>
              <option value="Paint">Paint</option>
              <option value="Chemicals">Chemicals</option>
            </select>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end;">
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">Discount Percentage (%)</label>
            <input type="number" min="0" max="100" x-model="newRule.discount_pct" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)]" style="height:38px;" placeholder="e.g. 15" required />
          </div>
          <button type="submit" class="btn btn-primary" style="height:38px; display:flex; align-items:center; gap:6px;">
            <i data-lucide="plus" class="w-4 h-4"></i> Save Rule
          </button>
        </div>
      </form>

      <!-- Rules Table -->
      <div class="overflow-x-auto border border-[var(--border)] rounded-xl">
        <table class="data-table">
          <thead>
            <tr>
              <th class="cursor-pointer" @click="rulesSortKey = 'tier'; rulesSortDesc = !rulesSortDesc">
                Tier
                <span x-show="rulesSortKey === 'tier'" x-text="rulesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th class="cursor-pointer" @click="rulesSortKey = 'category'; rulesSortDesc = !rulesSortDesc">
                Category
                <span x-show="rulesSortKey === 'category'" x-text="rulesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th style="text-align:center; cursor-pointer;" @click="rulesSortKey = 'discount_pct'; rulesSortDesc = !rulesSortDesc">
                Discount
                <span x-show="rulesSortKey === 'discount_pct'" x-text="rulesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="sortedRules().length === 0">
              <tr>
                <td colspan="4" style="text-align:center; font-style:italic; color:var(--text-3); padding:20px;">No tier pricing rules configured.</td>
              </tr>
            </template>
            <template x-for="rule in paginatedRules()" :key="rule.id">
              <tr>
                <td style="font-weight:bold; text-transform:capitalize; color:var(--text-1);" x-text="rule.tier"></td>
                <td x-text="rule.category"></td>
                <td style="text-align:center; font-weight:bold; color:var(--green);" x-text="Math.round(rule.discount_pct * 100) + '%'"></td>
                <td style="text-align:right;">
                  <button @click="deleteTierRule(rule.id)" class="btn btn-ghost btn-sm" style="color:var(--red); padding:4px 8px;">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Pagination for Rules -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--text-2);">
        <div x-text="`Showing ${paginatedRules().length} of ${sortedRules().length} rules`"></div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button @click="if(rulesPage > 1) rulesPage--" :disabled="rulesPage === 1" class="btn btn-ghost btn-sm" style="padding:4px 8px;">Prev</button>
          <span x-text="`Page ${rulesPage} of ${rulesTotalPages()}`"></span>
          <button @click="if(rulesPage < rulesTotalPages()) rulesPage++" :disabled="rulesPage === rulesTotalPages()" class="btn btn-ghost btn-sm" style="padding:4px 8px;">Next</button>
        </div>
      </div>
    </div>

    <!-- RIGHT COLUMN: CUSTOMER CUSTOM PRICES (CONTRACTS) -->
    <div class="section-card" style="padding:20px;">
      <div class="section-header" style="border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
        <h3 class="section-title">
          <i data-lucide="shield-alert" class="w-4 h-4" style="color:var(--accent-2);"></i>
          Customer SKU Custom Prices
        </h3>
        
        <!-- Local Search -->
        <input 
          type="text" 
          placeholder="Filter overrides..." 
          x-model="customPricesSearch" 
          @input="customPricesPage = 1" 
          class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-[10px] text-[var(--text-1)] px-2.5 py-1 outline-none focus:border-[var(--accent)] w-32" 
        />
      </div>

      <!-- Add Override Form -->
      <form @submit.prevent="addCustomPrice" style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px; background:rgba(255,255,255,0.02); padding:14px; border:1px solid var(--border); border-radius:12px;">
        <div style="display:grid; grid-template-columns:1.2fr 1fr; gap:10px;">
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">Customer Email</label>
            <input type="email" x-model="newCustomPrice.customer_email" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)]" style="height:38px;" placeholder="e.g. buyer@apex.com" required />
          </div>
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">SKU ID</label>
            <input type="text" x-model="newCustomPrice.sku_id" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)]" style="height:38px;" placeholder="e.g. PVC-PIPE-075-10" required />
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end;">
          <div style="display:flex; flex-direction:column; gap:4px;">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; color:var(--text-3);">Custom Price Override (INR)</label>
            <input type="number" step="0.01" min="0" x-model="newCustomPrice.custom_price" class="bg-[var(--bg-input)] border border-[var(--border)] rounded-xl text-xs text-[var(--text-1)] p-2 outline-none focus:border-[var(--accent)]" style="height:38px;" placeholder="e.g. 7.50" required />
          </div>
          <button type="submit" class="btn btn-primary" style="height:38px; display:flex; align-items:center; gap:6px;">
            <i data-lucide="plus" class="w-4 h-4"></i> Save Override
          </button>
        </div>
      </form>

      <!-- Overrides Table -->
      <div class="overflow-x-auto border border-[var(--border)] rounded-xl">
        <table class="data-table">
          <thead>
            <tr>
              <th class="cursor-pointer" @click="customPricesSortKey = 'customer_email'; customPricesSortDesc = !customPricesSortDesc">
                Customer
                <span x-show="customPricesSortKey === 'customer_email'" x-text="customPricesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th class="cursor-pointer" @click="customPricesSortKey = 'sku_id'; customPricesSortDesc = !customPricesSortDesc">
                SKU ID
                <span x-show="customPricesSortKey === 'sku_id'" x-text="customPricesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th style="text-align:center; cursor-pointer;" @click="customPricesSortKey = 'custom_price'; customPricesSortDesc = !customPricesSortDesc">
                Custom Price
                <span x-show="customPricesSortKey === 'custom_price'" x-text="customPricesSortDesc ? '▼' : '▲'"></span>
              </th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="sortedCustomPrices().length === 0">
              <tr>
                <td colspan="4" style="text-align:center; font-style:italic; color:var(--text-3); padding:20px;">No custom contract prices configured.</td>
              </tr>
            </template>
            <template x-for="price in paginatedCustomPrices()" :key="price.id">
              <tr>
                <td>
                  <div class="font-bold text-[var(--text-1)]" x-text="price.customer_email"></div>
                </td>
                <td class="font-mono text-xs" x-text="price.sku_id"></td>
                <td style="text-align:center; font-weight:bold; font-family:var(--font-mono); color:var(--text-1);" x-text="fmt(price.custom_price)"></td>
                <td style="text-align:right;">
                  <button @click="deleteCustomPrice(price.id)" class="btn btn-ghost btn-sm" style="color:var(--red); padding:4px 8px;">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Pagination for Overrides -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--text-2);">
        <div x-text="`Showing ${paginatedCustomPrices().length} of ${sortedCustomPrices().length} overrides`"></div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button @click="if(customPricesPage > 1) customPricesPage--" :disabled="customPricesPage === 1" class="btn btn-ghost btn-sm" style="padding:4px 8px;">Prev</button>
          <span x-text="`Page ${customPricesPage} of ${customPricesTotalPages()}`"></span>
          <button @click="if(customPricesPage < customPricesTotalPages()) customPricesPage++" :disabled="customPricesPage === customPricesTotalPages()" class="btn btn-ghost btn-sm" style="padding:4px 8px;">Next</button>
        </div>
      </div>
    </div>

  </div>

</div>
